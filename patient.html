<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Психиатрические тесты — пациент</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="МедТесты">
    <meta name="theme-color" content="#1e4b4b">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f3f0;color:#2e2e2e;line-height:1.6;padding:1rem;display:flex;flex-direction:column;align-items:center;padding-top:max(1rem,env(safe-area-inset-top));padding-bottom:max(1rem,env(safe-area-inset-bottom))}
        .container{max-width:750px;width:100%;background:#fff;border-radius:28px;box-shadow:0 18px 40px rgba(0,0,0,.07);padding:1.8rem 1.5rem;margin:.6rem 0}
        .warning{background:#fff7e5;border-left:5px solid #d18e2c;padding:.8rem 1rem;border-radius:14px;margin-bottom:1.5rem;font-size:.9rem;color:#5c4300}
        h1{font-size:1.6rem;font-weight:600;margin-bottom:.3rem;color:#1e3b3b}
        h2{font-size:1.2rem;color:#1e3b3b;margin-bottom:.8rem}
        .subtitle{color:#4f5d5d;margin-bottom:1.2rem;font-size:.9rem}
        label{display:block;font-weight:600;margin-bottom:.2rem;color:#1f3a3a;font-size:.9rem}
        input[type=text],input[type=date]{width:100%;padding:.6rem .8rem;border:1px solid #ddd7cd;border-radius:10px;font-size:.9rem;margin-bottom:.8rem;background:#fff}
        .btn{background:#1e4b4b;border:none;color:#fff;font-weight:600;padding:.7rem 1.5rem;border-radius:40px;cursor:pointer;font-size:.9rem;margin:.4rem;box-shadow:0 4px 12px rgba(0,0,0,.08);touch-action:manipulation}
        .btn:active{background:#143636}
        .btn:disabled{background:#c2bfb6;cursor:not-allowed;box-shadow:none}
        .btn-secondary{background:transparent;color:#2c4f4f;border:1.5px solid #2c4f4f;box-shadow:none}
        .btn-secondary:active{background:#e9f0f0}
        .question-box{background:#f9f8f6;border-radius:18px;padding:1.2rem;margin:1rem 0;border:1px solid #eae3d8}
        .question-text{font-weight:600;margin-bottom:.8rem;color:#1f3a3a}
        .options{display:flex;flex-direction:column;gap:.4rem}
        .option-item{display:flex;align-items:flex-start;gap:.4rem;background:#fff;border:1px solid #ddd7cd;border-radius:10px;padding:.45rem .7rem;cursor:pointer}
        .option-item:active{background:#f4efe6}
        .option-item input{margin-top:.2rem;accent-color:#2c5f5f;transform:scale(1.1);flex-shrink:0}
        .option-item select{flex-shrink:0}
        .result-block{background:#eaf4f3;border-radius:20px;padding:1.2rem;margin-top:1rem;border:1px solid #c5dcd8}
        .result-title{font-weight:700;font-size:1.1rem;color:#0e3b3b;margin-bottom:.5rem}
        .hidden{display:none}
        .install-banner{background:#1e4b4b;color:#fff;border-radius:16px;padding:.8rem 1rem;margin-bottom:1rem;display:none;align-items:center;justify-content:space-between;gap:.6rem;font-size:.9rem}
        .install-banner .install-btn{background:#fff;color:#1e4b4b;border:none;padding:.45rem 1rem;border-radius:20px;font-weight:600;font-size:.85rem;cursor:pointer}
        .install-banner .close-banner{background:transparent;color:#fff;border:none;font-size:1.3rem;cursor:pointer}
        hr{margin:1rem 0;border:.5px solid #e0d7c8}
        .small-note{font-size:.8rem;color:#6b6257;margin-top:.4rem}
        @media(max-width:500px){.container{padding:1.2rem 1rem}.btn{width:100%;margin:.3rem 0}}
    </style>
</head>
<body>
<div class="install-banner" id="installBanner"><span>📲 Установите как приложение</span><button class="install-btn" id="installBtn">Установить</button><button class="close-banner" id="closeBanner">&times;</button></div>
<div class="container" id="appContainer">
    <div class="warning">⚕️ <strong>Важно:</strong> этот тест не заменяет консультацию врача-психиатра. Результаты носят скрининговый характер. При любых тревожных показателях обратитесь к специалисту.</div>
    <h1>📋 Психиатрические тесты</h1>
    <div class="subtitle">Шкала депрессии Бека • Полный опросник PHQ</div>
    <div id="dynamicContent"></div>
</div>
<script>
// ========== PWA ==========
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
let deferredPrompt;
const banner=document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;banner.style.display='flex'});
document.addEventListener('click',e=>{if(e.target.id==='installBtn'&&deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;banner.style.display='none'})}if(e.target.id==='closeBanner')banner.style.display='none'});
window.addEventListener('appinstalled',()=>{banner.style.display='none'});

// ========== STATE ==========
const state={
    step:'register',
    patient:{name:'',birth:'',date:''},
    test:'',
    answers:{},
    beckScore:0,
    phqSomatic:false,phqPanic:false,phqOtherAnx:false,phqBinge:false,phqBulimia:false,phqAlcohol:false,
    phqDepScore:0,phqDepSev:'',phqAnxScore:0
};
const container=document.getElementById('dynamicContent');

// ========== REGISTER ==========
function renderRegister(){
    container.innerHTML=`
        <div class="question-box">
            <h2>Данные пациента</h2>
            <label>Фамилия Имя Отчество</label><input type="text" id="regName" placeholder="Иванов Иван Иванович">
            <label>Дата рождения</label><input type="date" id="regBirth">
            <label>Дата опроса</label><input type="date" id="regDate">
            <button class="btn" id="regNext">Далее →</button>
        </div>`;
    document.getElementById('regNext').addEventListener('click',()=>{
        state.patient.name=document.getElementById('regName').value.trim()||'Не указано';
        state.patient.birth=document.getElementById('regBirth').value||'Не указана';
        state.patient.date=document.getElementById('regDate').value||new Date().toISOString().slice(0,10);
        renderTestSelect();
    });
}

// ========== TEST SELECT ==========
function renderTestSelect(){
    container.innerHTML=`
        <div class="question-box">
            <h2>Выберите тест</h2>
            <button class="btn" id="selBeck">Шкала депрессии Бека (21 вопрос)</button>
            <button class="btn" id="selPHQ">Полный опросник PHQ</button>
        </div>`;
    document.getElementById('selBeck').addEventListener('click',()=>{state.test='beck';renderBeck(0)});
    document.getElementById('selPHQ').addEventListener('click',()=>{state.test='phq';renderPHQ_1()});
}

// ========== BECK ==========
const beckQuestions=[
{id:1,text:'1. Выберите одно утверждение:',opts:[{v:0,t:'Я не чувствую себя расстроенным, печальным.'},{v:1,t:'Я расстроен.'},{v:2,t:'Я все время расстроен и не могу от этого отключиться.'},{v:3,t:'Я настолько расстроен и несчастлив, что не могу это выдержать.'}]},
{id:2,text:'2. Выберите одно утверждение:',opts:[{v:0,t:'Я не тревожусь о своем будущем.'},{v:1,t:'Я чувствую, что озадачен будущим.'},{v:2,t:'Я чувствую, что меня ничего не ждет в будущем.'},{v:3,t:'Мое будущее безнадежно, и ничто не может измениться к лучшему.'}]},
{id:3,text:'3. Выберите одно утверждение:',opts:[{v:0,t:'Я не чувствую себя неудачником.'},{v:1,t:'Я чувствую, что терпел больше неудач, чем другие люди.'},{v:2,t:'Когда я оглядываюсь на свою жизнь, я вижу в ней много неудач.'},{v:3,t:'Я чувствую, что как личность я — полный неудачник.'}]},
{id:4,text:'4. Выберите одно утверждение:',opts:[{v:0,t:'Я получаю столько же удовлетворения от жизни, как раньше.'},{v:1,t:'Я не получаю столько же удовлетворения от жизни, как раньше.'},{v:2,t:'Я больше не получаю удовлетворения ни от чего.'},{v:3,t:'Я полностью не удовлетворен жизнью, и мне все надоело.'}]},
{id:5,text:'5. Выберите одно утверждение:',opts:[{v:0,t:'Я не чувствую себя в чем-нибудь виноватым.'},{v:1,t:'Достаточно часто я чувствую себя виноватым.'},{v:2,t:'Большую часть времени я чувствую себя виноватым.'},{v:3,t:'Я постоянно испытываю чувство вины.'}]},
{id:6,text:'6. Выберите одно утверждение:',opts:[{v:0,t:'Я не чувствую, что могу быть наказанным за что-либо.'},{v:1,t:'Я чувствую, что могу быть наказан.'},{v:2,t:'Я ожидаю, что могу быть наказан.'},{v:3,t:'Я чувствую себя уже наказанным.'}]},
{id:7,text:'7. Выберите одно утверждение:',opts:[{v:0,t:'Я не разочаровался в себе.'},{v:1,t:'Я разочаровался в себе.'},{v:2,t:'Я себе противен.'},{v:3,t:'Я себя ненавижу.'}]},
{id:8,text:'8. Выберите одно утверждение:',opts:[{v:0,t:'Я знаю, что я не хуже других.'},{v:1,t:'Я критикую себя за ошибки и слабости.'},{v:2,t:'Я все время обвиняю себя за свои поступки.'},{v:3,t:'Я виню себя во всем плохом, что происходит.'}]},
{id:9,text:'9. Выберите одно утверждение:',opts:[{v:0,t:'Я не думал покончить с собой.'},{v:1,t:'Ко мне приходят мысли покончить с собой, но я не буду их осуществлять.'},{v:2,t:'Я хотел бы покончить с собой.'},{v:3,t:'Я бы убил себя, если бы представился случай.'}]},
{id:10,text:'10. Выберите одно утверждение:',opts:[{v:0,t:'Я плачу не больше, чем обычно.'},{v:1,t:'Сейчас я плачу чаще, чем раньше.'},{v:2,t:'Теперь я все время плачу.'},{v:3,t:'Раньше я мог плакать, а сейчас не могу, даже если мне хочется.'}]},
{id:11,text:'11. Выберите одно утверждение:',opts:[{v:0,t:'Сейчас я раздражителен не более, чем обычно.'},{v:1,t:'Я более легко раздражаюсь, чем раньше.'},{v:2,t:'Теперь я постоянно чувствую, что раздражен.'},{v:3,t:'Я стал равнодушен к вещам, которые меня раньше раздражали.'}]},
{id:12,text:'12. Выберите одно утверждение:',opts:[{v:0,t:'Я не утратил интереса к другим людям.'},{v:1,t:'Я меньше интересуюсь другими людьми, чем раньше.'},{v:2,t:'Я почти потерял интерес к другим людям.'},{v:3,t:'Я полностью утратил интерес к другим людям.'}]},
{id:13,text:'13. Выберите одно утверждение:',opts:[{v:0,t:'Я, как и раньше, иногда откладываю принятие решения.'},{v:1,t:'Я чаще, чем раньше, откладываю принятие решения.'},{v:2,t:'Мне труднее принимать решения, чем раньше.'},{v:3,t:'Я больше не могу принимать решения.'}]},
{id:14,text:'14. Выберите одно утверждение:',opts:[{v:0,t:'Я не чувствую, что выгляжу хуже, чем обычно.'},{v:1,t:'Меня тревожит, что я выгляжу старым и непривлекательным.'},{v:2,t:'Я знаю, что в моей внешности произошли существенные изменения, делающие меня непривлекательным.'},{v:3,t:'Я знаю, что выгляжу безобразно.'}]},
{id:15,text:'15. Выберите одно утверждение:',opts:[{v:0,t:'Я могу работать так же хорошо, как и раньше.'},{v:1,t:'Мне необходимо сделать дополнительное усилие, чтобы начать делать что-нибудь.'},{v:2,t:'Я с трудом заставляю себя делать что-либо.'},{v:3,t:'Я совсем не могу выполнять никакую работу.'}]},
{id:16,text:'16. Выберите одно утверждение:',opts:[{v:0,t:'Я сплю так же хорошо, как и раньше.'},{v:1,t:'Сейчас я сплю хуже, чем раньше.'},{v:2,t:'Я просыпаюсь на 1-2 часа раньше, и мне трудно заснуть опять.'},{v:3,t:'Я просыпаюсь на несколько часов раньше обычного и больше не могу заснуть.'}]},
{id:17,text:'17. Выберите одно утверждение:',opts:[{v:0,t:'Я устаю не больше, чем обычно.'},{v:1,t:'Теперь я устаю быстрее, чем раньше.'},{v:2,t:'Я устаю почти от всего, что я делаю.'},{v:3,t:'Я не могу ничего делать из-за усталости.'}]},
{id:18,text:'18. Выберите одно утверждение:',opts:[{v:0,t:'Мой аппетит не хуже, чем обычно.'},{v:1,t:'Мой аппетит стал хуже, чем раньше.'},{v:2,t:'Мой аппетит теперь значительно хуже.'},{v:3,t:'У меня вообще нет аппетита.'}]},
{id:19,text:'19. Выберите одно утверждение:',opts:[{v:0,t:'В последнее время я не похудел или потеря веса была незначительной.'},{v:1,t:'За последнее время я потерял более 2 кг.'},{v:2,t:'Я потерял более 5 кг.'},{v:3,t:'Я потерял более 7 кг.'}]},
{id:20,text:'20. Выберите одно утверждение:',opts:[{v:0,t:'Я беспокоюсь о своем здоровье не больше, чем обычно.'},{v:1,t:'Меня тревожат проблемы моего физического здоровья, такие, как боли, расстройство желудка, запоры.'},{v:2,t:'Я очень обеспокоен своим физическим состоянием, и мне трудно думать о чем-либо другом.'},{v:3,t:'Я настолько обеспокоен своим физическим состоянием, что больше ни о чем не могу думать.'}]},
{id:21,text:'21. Выберите одно утверждение:',opts:[{v:0,t:'В последнее время я не замечал изменения своего интереса к сексу.'},{v:1,t:'Меня меньше занимают проблемы секса, чем раньше.'},{v:2,t:'Сейчас я значительно меньше интересуюсь сексуальными проблемами, чем раньше.'},{v:3,t:'Я полностью утратил сексуальный интерес.'}]}
];
function renderBeck(idx){
    if(idx>=beckQuestions.length){beckResult();return}
    const q=beckQuestions[idx];
    container.innerHTML=`<div class="question-box"><div class="question-text">${q.text}</div><div class="options" id="beckOpts"></div><div class="nav-buttons"><button class="btn btn-secondary" id="beckBack">← Назад</button></div></div>`;
    const optsDiv=document.getElementById('beckOpts');
    q.opts.forEach(o=>{
        const div=document.createElement('div');div.className='option-item';
        div.innerHTML=`<input type="radio" name="bq" value="${o.v}" id="bq_${o.v}"><label for="bq_${o.v}" class="option-label">${o.t}</label>`;
        optsDiv.appendChild(div);
    });
    document.getElementById('beckBack').addEventListener('click',()=>{if(idx===0)renderTestSelect();else renderBeck(idx-1)});
    optsDiv.querySelectorAll('input').forEach(r=>r.addEventListener('change',()=>{
        state.answers['beck_'+q.id]=parseInt(r.value);
        setTimeout(()=>renderBeck(idx+1),150);
    }));
}
function beckResult(){
    let sum=0;for(let i=1;i<=21;i++)sum+=(state.answers['beck_'+i]||0);
    state.beckScore=sum;
    let severity='';
    if(sum<=9)severity='Отсутствие депрессивных симптомов';
    else if(sum<=15)severity='Легкая депрессия (субдепрессия)';
    else if(sum<=19)severity='Умеренная депрессия';
    else if(sum<=29)severity='Выраженная депрессия (средней тяжести)';
    else severity='Тяжелая депрессия';
    const caSub=Array.from({length:13},(_,i)=>state.answers['beck_'+(i+1)]||0).reduce((a,b)=>a+b,0);
    const spSub=Array.from({length:8},(_,i)=>state.answers['beck_'+(i+14)]||0).reduce((a,b)=>a+b,0);
    state._beckDetails={sum,severity,caSub,spSub};
    showResult('Шкала депрессии Бека',[
        `Общий балл: <strong>${sum}</strong> из 63`,
        `Интерпретация: <strong>${severity}</strong>`,
        `Когнитивно-аффективная субшкала (C-A): ${caSub}`,
        `Соматическая субшкала (S-P): ${spSub}`,
        sum>=20?'⚠️ Рекомендована консультация врача-психиатра.':'Результат в пределах нормы или субдепрессии. При сохранении симптомов обратитесь к врачу.'
    ]);
}

// ========== PHQ ==========
function renderPHQ_1(){
    container.innerHTML=`<div class="question-box"><div class="question-text">Раздел 1. Насколько часто за последние 4 недели Вас беспокоили:</div><div class="options" id="phq1Opts"></div><button class="btn" id="phq1Next">Далее →</button></div>`;
    const items=['Боль в желудке','Боль в спине','Боль в руках, ногах или суставах','Менструальные боли (жен.)','Боль при половом акте','Головные боли','Боль в грудной клетке','Головокружение','Обмороки','Усиленное сердцебиение','Одышка','Запор, диарея','Тошнота, газы'];
    const optsDiv=document.getElementById('phq1Opts');
    items.forEach((item,i)=>{
        const div=document.createElement('div');div.className='option-item';
        div.innerHTML=`<span style="flex:1">${item}</span>
        <select id="phq1_${i}" style="padding:.3rem;border-radius:6px;border:1px solid #ddd"><option value="0">Не беспокоила</option><option value="1">Иногда</option><option value="2">Постоянно</option></select>`;
        optsDiv.appendChild(div);
    });
    document.getElementById('phq1Next').addEventListener('click',()=>{
        const vals=Array.from(document.querySelectorAll('#phq1Opts select')).map(s=>parseInt(s.value));
        const countHigh=vals.filter(v=>v===2).length;
        state.phqSomatic=countHigh>=3;
        for(let i=0;i<vals.length;i++)state.answers['phq1_'+i]=vals[i];
        renderPHQ_2();
    });
}
function renderPHQ_2(){
    container.innerHTML=`<div class="question-box"><div class="question-text">Раздел 2. Насколько часто за последние 2 недели:</div><div class="options" id="phq2Opts"></div><button class="btn" id="phq2Next">Далее →</button></div>`;
    const items=['Вам не хотелось ничего делать','Плохое настроение, подавленность','Трудно заснуть или слишком много спали','Чувство усталости, упадок сил','Плохой аппетит или переедание','Плохо о себе думали, разочарованы в себе','Трудно сосредоточиться','Двигались/говорили слишком медленно или суетливо','Мысли о смерти или самоповреждении'];
    const optsDiv=document.getElementById('phq2Opts');
    items.forEach((item,i)=>{
        const div=document.createElement('div');div.className='option-item';
        div.innerHTML=`<span style="flex:1">${item}</span>
        <select id="phq2_${i}" style="padding:.3rem;border-radius:6px;border:1px solid #ddd"><option value="0">Не беспокоила</option><option value="1">Несколько дней</option><option value="2">Больше половины времени</option><option value="3">Практически ежедневно</option></select>`;
        optsDiv.appendChild(div);
    });
    document.getElementById('phq2Next').addEventListener('click',()=>{
        const vals=Array.from(document.querySelectorAll('#phq2Opts select')).map(s=>parseInt(s.value));
        for(let i=0;i<vals.length;i++)state.answers['phq2_'+i]=vals[i];
        const countHigh=vals.filter(v=>v>=2).length;
        const q2a=vals[0]>=2;const q2b=vals[1]>=2;const q2i=vals[8]>=1;
        const core=(q2a||q2b);
        const cnt=(q2i?countHigh:countHigh-(vals[8]>=2?0:0));
        if(core&&cnt>=5)state.phqDepSev='Большой депрессивный синдром';
        else if(core&&cnt>=2)state.phqDepSev='Другой депрессивный синдром';
        else state.phqDepSev='Депрессивный синдром не выявлен';
        state.phqDepScore=vals.reduce((a,b)=>a+b,0);
        renderPHQ_3();
    });
}
function renderPHQ_3(){
    container.innerHTML=`<div class="question-box"><div class="question-text">Раздел 3. Вопросы о тревоге.</div>

function phqResult(){
    const diagnoses=[];
    if(state.phqSomatic)diagnoses.push('Соматоформное расстройство (вероятно)');
    if(state.phqDepSev.includes('Большой'))diagnoses.push('Большой депрессивный синдром');
    else if(state.phqDepSev.includes('Другой'))diagnoses.push('Другой депрессивный синдром');
    if(state.phqPanic)diagnoses.push('Паническое расстройство (вероятно)');
    if(state.phqOtherAnx)diagnoses.push('Другое тревожное расстройство (вероятно)');
    if(state.phqBulimia)diagnoses.push('Нервная булимия (вероятно)');
    else if(state.phqBinge)diagnoses.push('Переедание (Binge Eating)');
    if(state.phqAlcohol)diagnoses.push('Алкогольная зависимость (вероятно)');
    if(diagnoses.length===0)diagnoses.push('Клинически значимых синдромов не выявлено');
    state._phqDetails={diagnoses,depScore:state.phqDepScore,depSev:state.phqDepSev,anxScore:state.phqAnxScore,somatic:state.phqSomatic,panic:state.phqPanic,otherAnx:state.phqOtherAnx,binge:state.phqBinge,bulimia:state.phqBulimia,alcohol:state.phqAlcohol};
    showResult('Полный опросник PHQ',[
        `Депрессивная шкала (PHQ-9): <strong>${state.phqDepScore} баллов</strong> — ${state.phqDepSev}`,
        `Тревожная шкала (GAD-7): <strong>${state.phqAnxScore} баллов</strong>`,
        `Соматоформное расстройство: <strong>${state.phqSomatic?'Вероятно':'Не выявлено'}</strong>`,
        `Паническое расстройство: <strong>${state.phqPanic?'Вероятно':'Не выявлено'}</strong>`,
        `Другое тревожное: <strong>${state.phqOtherAnx?'Вероятно':'Не выявлено'}</strong>`,
        `Пищевое поведение: <strong>${state.phqBulimia?'Булимия':state.phqBinge?'Переедание':'Не выявлено'}</strong>`,
        `Алкоголь: <strong>${state.phqAlcohol?'Вероятна зависимость':'Не выявлено'}</strong>`,
        `Заключение: <strong>${diagnoses.join('; ')}</strong>`,
        (state.phqDepScore>=15||state.phqPanic||state.phqAlcohol)?'⚠️ Рекомендована консультация врача-психиатра.':''
    ]);
}

function showResult(title,lines){
    let html=`<div class="result-block"><div class="result-title">📋 ${title}</div>`;
    lines.forEach(l=>html+=`<p style="margin-bottom:.5rem">${l}</p>`);
    html+=`<hr><p><strong>Пациент:</strong> ${state.patient.name}<br><strong>Дата рождения:</strong> ${state.patient.birth}<br><strong>Дата опроса:</strong> ${state.patient.date}</p>`;
    html+=`<button class="btn" id="saveResult">💾 Сохранить результат</button>`;
    html+=`<button class="btn" id="sendResult">📤 Отправить врачу</button>`;
    html+=`<button class="btn btn-secondary" id="restartTest">🔄 Пройти заново</button></div>`;
    container.innerHTML=html;
    document.getElementById('restartTest').addEventListener('click',()=>{
        state.answers={};state.beckScore=0;state.phqSomatic=false;state.phqPanic=false;state.phqOtherAnx=false;
        state.phqBinge=false;state.phqBulimia=false;state.phqAlcohol=false;state.phqDepScore=0;state.phqDepSev='';state.phqAnxScore=0;state.test='';state._beckDetails=null;state._phqDetails=null;
        renderTestSelect();
    });
    document.getElementById('saveResult').addEventListener('click',saveResult);
    document.getElementById('sendResult').addEventListener('click',sendResult);
}

        }

        // БЛОК 4
        r+=`\n[БЛОК 4 — СИМПТОМЫ ПОСЛЕДНЕГО ПРИСТУПА] (ДА/НЕТ):\n`;
        const panicSymptoms=['Одышка','Учащенное сердцебиение','Боль в грудной клетке','Потливость','Ощущение удушья','Приливы жара или озноб','Тошнота или дискомфорт в желудке','Головокружение','Покалывание или онемение','Дрожь в теле','Казалось, что Вы умираете'];
        let panicYesCount=0;
        panicSymptoms.forEach((item,i)=>{
            const score=state.answers['phq4_'+i]||0;
            if(score===1)panicYesCount++;
            r+=`  ${i+1}. ${item}: ${score===1?'ДА':'НЕТ'}\n`;
        });
        r+=`  → Симптомов ДА: ${panicYesCount} из 11 (порог для панического р-ва: ≥4 при выполнении 3a-3d)\n`;

        // БЛОК 5
        r+=`\n[БЛОК 5 — ТРЕВОГА] Ответы за последние 4 недели (0-2):\n`;
        const anxItems=['Нервничали, тревожились','Взбудоражены, трудно усидеть','Быстро уставали','Напряжение в мышцах','Трудно заснуть','Трудно сосредоточиться','Легко раздражались'];
        anxItems.forEach((item,i)=>{
            const score=state.answers['phq5_'+i]||0;
            const marker=score>=2?' ⚠️':'';
            r+=`  ${i+1}. ${item}: ${score} балла(ов)${marker}\n`;
        });

        // БЛОК 6-8
        r+=`\n[БЛОК 6-8 — ПИЩЕВОЕ ПОВЕДЕНИЕ]:\n`;
        r+=`  6a. Не можете контролировать что/сколько едите: ${state.answers.phq6a?'ДА':'НЕТ'}\n`;
        r+=`  6b. Съедаете необычно большие порции за 2 часа: ${state.answers.phq6b?'ДА':'НЕТ'}\n`;
        r+=`  6c. Происходило ≥2 раз в неделю за последние 3 месяца: ${state.answers.phq6c?'ДА':'НЕТ'}\n`;
        const phq7items=['Вызывали рвоту','Превышали дозу слабительного','Воздерживались от еды ≥24 часов','Занимались упражнениями >1 часа'];
        r+=`  Раздел 7 — Компенсаторное поведение:\n`;
        let phq7any=false;
        phq7items.forEach((item,i)=>{
            const score=state.answers['phq7_'+i]||0;
            if(score===1)phq7any=true;
            r+=`    ${i+1}. ${item}: ${score===1?'ДА':'НЕТ'}\n`;
        });
        r+=`  8. Делали это ≥2 раз в неделю: ${state.answers.phq8?'ДА':'НЕТ'}\n`;

        // БЛОК 10
        r+=`\n[БЛОК 10 — АЛКОГОЛЬ] За последние 6 месяцев более одного раза:\n`;
        const alcItems=['Пили вопреки рекомендации врача','Были в опьянении на работе/учёбе','Опаздывали из-за похмелья','Проблемы в общении','Водили машину после выпивки'];
        let alcYesCount=0;
        alcItems.forEach((item,i)=>{
            const score=state.answers['phq10_'+i]||0;
            if(score===1)alcYesCount++;
            r+=`  ${i+1}. ${item}: ${score===1?'ДА':'НЕТ'}\n`;
        });
        r+=`  → Критериев ДА: ${alcYesCount} из 5 (порог для алкогольной зависимости: 5 из 5)\n`;

        // БЛОК 11
        const diffLabels=['Совсем не трудно','Немного трудно','Очень трудно','Чрезвычайно трудно'];
        r+=`\n[БЛОК 11 — УРОВЕНЬ ТРУДНОСТЕЙ]: ${diffLabels[state.answers.phq11]||'Не указано'}\n`;

        r+=`\n========================================\n`;
        r+=`ДИАГНОСТИЧЕСКИЕ ЛИНЕЙКИ:\n`;
        r+=`Соматоформное расстройство: ${state._phqDetails.somatic?'Да (≥3 симптомов постоянно)':'Нет'}\n`;
        r+=`Паническое расстройство: ${state._phqDetails.panic?'Да (критерии выполнены)':'Нет'}\n`;
        r+=`Другое тревожное расстройство: ${state._phqDetails.otherAnx?'Да (критерии выполнены)':'Нет'}\n`;
        r+=`Нервная булимия: ${state._phqDetails.bulimia?'Да':'Нет'}\n`;
        r+=`Переедание (Binge Eating): ${state._phqDetails.binge?'Да':'Нет'}\n`;
        r+=`Алкогольная зависимость: ${state._phqDetails.alcohol?'Да (все 5 критериев)':'Нет'}\n`;
        r+=`\nЗаключение: ${state._phqDetails.diagnoses.join('; ')}\n`;
    }

    r+=`\n========================================\n`;
    r+=`⚠️ Результаты носят скрининговый характер. Необходима консультация врача-психиатра.\n`;
    return r;
}

function saveResult(){
    const text=buildReport();
    const filename=`${state.patient.name.replace(/\s/g,'_')}_${state.test}_${state.patient.date}.txt`;
    try{
        const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(e){
        const dataUri='data:text/plain;charset=utf-8,'+encodeURIComponent(text);
        const a=document.createElement('a');a.href=dataUri;a.download=filename;document.body.appendChild(a);a.click();a.remove();
    }
}

    const text=encodeURIComponent(buildReport());
    const subject=encodeURIComponent(`Результаты тестирования: ${state.patient.name}`);
    const mailUrl=`mailto:fordrimik@gmail.com?subject=${subject}&body=${text}`;
    const waUrl=`https://wa.me/79256103513?text=${text}`;
    const tgUrl=`https://t.me/hxtengo?text=${text}`;
    const sendDiv=document.createElement('div');
    sendDiv.style.marginTop='1rem';
    sendDiv.innerHTML=`
        <strong>Выберите способ отправки:</strong><br>
        <button class="btn" id="sendMail">📧 Email</button>
        <button class="btn" id="sendWa">💬 WhatsApp</button>
        <button class="btn" id="sendTg">✈️ Telegram</button>`;
    container.querySelector('.result-block').appendChild(sendDiv);
    document.getElementById('sendMail').addEventListener('click',()=>window.open(mailUrl));

}
